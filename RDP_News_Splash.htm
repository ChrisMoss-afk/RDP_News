<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RDP News: Platform Selection</title>

  <style>
    /* § COMMENT: Design tokens */
    :root {
      --bg: #0d1117;
      --text: #ffffff;
      --gap: 20px;
      --platform-size: 170px;
      --logo-size: 220px;
      --transition-speed: 0.18s;
    }

    /* § COMMENT: Normalize */
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    /* § COMMENT: Centered layout */
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    /* § COMMENT: Width constraint */
    .page-wrap {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    /* § COMMENT: Logo */
    .logo {
      width: min(var(--logo-size), 45vw);
      display: block;
      margin: 0 auto 20px;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* § COMMENT: Heading */
    h1 {
      margin: 0 0 28px;
      font-size: clamp(1.8rem, 2.6vw, 2.5rem);
      font-weight: 700;
    }

    /* § COMMENT: Layout */
    .platform-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--gap);
    }

    /* § COMMENT: Button shell */
    .platform-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--platform-size);
      height: var(--platform-size);
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 18px;
      transition: transform var(--transition-speed) ease;
      touch-action: manipulation;
    }

    /* § COMMENT: Hover / press */
    .platform-btn:hover { transform: translateY(-2px); }
    .platform-btn:active { transform: scale(0.97); }

    /* § COMMENT: Image fit */
    .platform-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    /* § COMMENT: Responsive */
    @media (max-width: 768px) {
      :root {
        --platform-size: 145px;
        --logo-size: 190px;
        --gap: 16px;
      }
    }

    @media (max-width: 480px) {
      :root {
        --platform-size: 120px;
        --logo-size: 160px;
        --gap: 14px;
      }
    }
  </style>
</head>

<body>

  <main class="page-wrap">

    <img src="img/RDP_News_Logo.png" alt="RDP News Logo" class="logo" />

    <h1>Select Your Preferred Platform</h1>

    <div class="platform-grid">

      <!-- § COMMENT: YouTube -->
      <button class="platform-btn"
        data-ios="youtube://"
        data-android="vnd.youtube://"
        data-web="https://www.youtube.com"
        data-default-img="img/png_YouTube.png"
        data-hover-img="img/png_YouTube_ovr.png">
        <img src="img/png_YouTube.png" alt="YouTube">
      </button>

      <!-- § COMMENT: Instagram (UPDATED TARGET) -->
      <button class="platform-btn"
        data-ios="instagram://user?username=reddeerpolytechnic"
        data-android="intent://instagram.com/_u/reddeerpolytechnic/#Intent;package=com.instagram.android;scheme=https;end"
        data-web="https://www.instagram.com/reddeerpolytechnic/"
        data-default-img="img/png_Instagram.png"
        data-hover-img="img/png_Instagram_ovr.png">
        <img src="img/png_Instagram.png" alt="Instagram">
      </button>

      <!-- § COMMENT: TikTok -->
      <button class="platform-btn"
        data-ios="snssdk1128://"
        data-android="snssdk1128://"
        data-web="https://www.tiktok.com"
        data-default-img="img/png_TikTok.png"
        data-hover-img="img/png_TikTok_ovr.png">
        <img src="img/png_TikTok.png" alt="TikTok">
      </button>

    </div>

  </main>

  <script>

    // ============================================================
    // DEVICE DETECTION
    // ============================================================
    // § COMMENT: OS routing
    function getDevice() {
      const ua = navigator.userAgent;
      if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
      if (/Android/i.test(ua)) return "Android";
      return "Desktop";
    }

    // ============================================================
    // APP LAUNCH + FALLBACK
    // ============================================================
    // § COMMENT: Try app first, fallback if no context switch
    function openApp(ios, android, web) {

      const device = getDevice();

      if (device === "Desktop") {
        window.location.href = web;
        return;
      }

      const link = device === "iOS" ? ios : android;

      let leftPage = false;

      const markLeave = () => leftPage = true;

      window.addEventListener("pagehide", markLeave, { once: true });
      window.addEventListener("blur", markLeave, { once: true });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) leftPage = true;
      });

      // § COMMENT: Launch app
      window.location.href = link;

      // § COMMENT: Fallback
      setTimeout(() => {
        if (!leftPage) window.location.href = web;
      }, 1800);
    }

    // ============================================================
    // IMAGE STATE SWAPS
    // ============================================================
    // § COMMENT: Toggle asset
    function swap(btn, state) {
      const img = btn.querySelector("img");
      img.src = state ? btn.dataset.hoverImg : btn.dataset.defaultImg;
    }

    document.querySelectorAll(".platform-btn").forEach(btn => {

      btn.addEventListener("mouseenter", () => swap(btn, true));
      btn.addEventListener("mouseleave", () => swap(btn, false));

      btn.addEventListener("mousedown", () => swap(btn, true));
      btn.addEventListener("mouseup", () => swap(btn, false));

      btn.addEventListener("touchstart", () => swap(btn, true), { passive: true });
      btn.addEventListener("touchend", () => setTimeout(() => swap(btn, false), 120));

      btn.addEventListener("click", () => {
        openApp(
          btn.dataset.ios,
          btn.dataset.android,
          btn.dataset.web
        );
      });

    });

  </script>

</body>
</html>
