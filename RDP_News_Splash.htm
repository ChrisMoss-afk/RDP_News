<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDP News: Platform Selection</title>

<style>

/* § COMMENT: Design tokens */
:root {
  --bg: #0d1117;
  --text: #ffffff;
  --gap: 20px;
  --platform: 170px;
  --logo: 220px;
}

/* § COMMENT: Reset */
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 30px;
  text-align: center;
}

/* § COMMENT: Layout container */
.wrap {
  max-width: 900px;
  width: 100%;
}

/* § COMMENT: Logo */
.logo {
  width: min(var(--logo), 45vw);
  margin-bottom: 20px;
}

/* § COMMENT: Heading */
h1 {
  margin-bottom: 30px;
}

/* § COMMENT: Platform layout */
.grid {
  display: flex;
  justify-content: center;
  gap: var(--gap);
  flex-wrap: wrap;
}

/* § COMMENT: Button shell */
.btn {
  width: var(--platform);
  height: var(--platform);
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 16px;
  transition: transform 0.15s ease;
}

/* § COMMENT: Hover / press */
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: scale(0.97); }

/* § COMMENT: Image fill */
.btn img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
}

/* § COMMENT: Mobile scaling */
@media (max-width: 600px) {
  :root {
    --platform: 130px;
    --logo: 180px;
  }
}

</style>
</head>

<body>

<div class="wrap">

  <!-- § COMMENT: Logo -->
  <img src="img/RDP_News_Logo.png" class="logo">

  <h1>Select Your Preferred Platform</h1>

  <div class="grid">

    <!-- § COMMENT: YouTube -->
    <button class="btn"
      data-ios="youtube://"
      data-android="vnd.youtube://"
      data-web="https://www.youtube.com"
      data-default="img/png_YouTube.png"
      data-hover="img/png_YouTube_ovr.png">
      <img src="img/png_YouTube.png">
    </button>

    <!-- § COMMENT: Instagram (FIXED) -->
    <button class="btn"
      data-ios="instagram://user?username=instagram"
      data-android="intent://instagram.com/#Intent;package=com.instagram.android;scheme=https;end"
      data-web="https://www.instagram.com"
      data-default="img/png_Instagram.png"
      data-hover="img/png_Instagram_ovr.png">
      <img src="img/png_Instagram.png">
    </button>

    <!-- § COMMENT: TikTok -->
    <button class="btn"
      data-ios="snssdk1128://"
      data-android="snssdk1128://"
      data-web="https://www.tiktok.com"
      data-default="img/png_TikTok.png"
      data-hover="img/png_TikTok_ovr.png">
      <img src="img/png_TikTok.png">
    </button>

  </div>
</div>

<script>

// ============================================================
// DEVICE DETECTION
// ============================================================
// § COMMENT: Basic OS routing
function getDevice() {
  const ua = navigator.userAgent;
  if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
  if (/Android/i.test(ua)) return "Android";
  return "Desktop";
}

// ============================================================
// APP LAUNCH + FALLBACK (HARDENED)
// ============================================================
// § COMMENT: Attempt deep link, fallback if no app switch
function openApp(ios, android, web) {

  const device = getDevice();

  if (device === "Desktop") {
    window.location.href = web;
    return;
  }

  const link = device === "iOS" ? ios : android;

  let hidden = false;

  // § COMMENT: Detect app switch
  const visibilityHandler = () => {
    if (document.hidden) hidden = true;
  };

  document.addEventListener("visibilitychange", visibilityHandler);

  // § COMMENT: Launch attempt
  window.location.href = link;

  // § COMMENT: Fallback
  setTimeout(() => {
    document.removeEventListener("visibilitychange", visibilityHandler);
    if (!hidden) window.location.href = web;
  }, 1700);
}

// ============================================================
// IMAGE SWAP SYSTEM
// ============================================================
// § COMMENT: Swap asset
function swap(btn, state) {
  const img = btn.querySelector("img");
  img.src = state ? btn.dataset.hover : btn.dataset.default;
}

// § COMMENT: Bind events
document.querySelectorAll(".btn").forEach(btn => {

  btn.addEventListener("mouseenter", () => swap(btn, true));
  btn.addEventListener("mouseleave", () => swap(btn, false));

  btn.addEventListener("mousedown", () => swap(btn, true));
  btn.addEventListener("mouseup", () => swap(btn, false));

  btn.addEventListener("touchstart", () => swap(btn, true), { passive: true });
  btn.addEventListener("touchend", () => setTimeout(() => swap(btn, false), 100));

  btn.addEventListener("click", () => {
    openApp(
      btn.dataset.ios,
      btn.dataset.android,
      btn.dataset.web
    );
  });

});

</script>

</body>
</html>
