<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RDP News: Platform Selection</title>

  <style>
    /* § COMMENT: Design tokens (color, scale, timing) */
    :root {
      --bg: #0d1117;
      --text: #ffffff;
      --card-gap: 20px;
      --platform-size: 170px;
      --logo-size: 220px;
      --transition-speed: 0.18s;
    }

    /* § COMMENT: Normalize box model */
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    /* § COMMENT: Centered layout, dark UI */
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    /* § COMMENT: Content width constraint */
    .page-wrap {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    /* § COMMENT: Logo scaling + centering */
    .logo {
      width: min(var(--logo-size), 45vw);
      height: auto;
      display: block;
      margin: 0 auto 20px;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* § COMMENT: Responsive heading */
    h1 {
      margin: 0 0 28px;
      font-size: clamp(1.8rem, 2.6vw, 2.5rem);
      line-height: 1.2;
      font-weight: 700;
    }

    /* § COMMENT: Platform layout */
    .platform-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--card-gap);
    }

    /* § COMMENT: Clickable image container */
    .platform-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--platform-size);
      height: var(--platform-size);
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 18px;
      transition: transform var(--transition-speed) ease;
      touch-action: manipulation;
    }

    /* § COMMENT: Hover lift */
    .platform-btn:hover {
      transform: translateY(-2px);
    }

    /* § COMMENT: Press feedback */
    .platform-btn:active {
      transform: scale(0.97);
    }

    /* § COMMENT: Keyboard accessibility */
    .platform-btn:focus-visible {
      outline: 3px solid rgba(255,255,255,0.65);
      outline-offset: 6px;
    }

    /* § COMMENT: Image fill behavior */
    .platform-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    /* § COMMENT: Tablet scaling */
    @media (max-width: 768px) {
      :root {
        --platform-size: 145px;
        --logo-size: 190px;
        --card-gap: 16px;
      }
    }

    /* § COMMENT: Mobile scaling */
    @media (max-width: 480px) {
      :root {
        --platform-size: 120px;
        --logo-size: 160px;
        --card-gap: 14px;
      }
    }

  </style>
</head>

<body>

  <main class="page-wrap">

    <!-- § COMMENT: Brand anchor -->
    <img src="img/RDP_News_Logo.png" alt="RDP News Logo" class="logo" />

    <h1>Select Your Preferred Platform</h1>

    <!-- § COMMENT: Data-driven platform buttons -->
    <div class="platform-grid">

      <button class="platform-btn"
        data-ios="youtube://"
        data-android="vnd.youtube://"
        data-web="https://www.youtube.com"
        data-default-img="img/png_YouTube.png"
        data-hover-img="img/png_YouTube_ovr.png">
        <img src="img/png_YouTube.png" alt="YouTube">
      </button>

      <button class="platform-btn"
        data-ios="instagram://app"
        data-android="instagram://"
        data-web="https://www.instagram.com"
        data-default-img="img/png_Instagram.png"
        data-hover-img="img/png_Instagram_ovr.png">
        <img src="img/png_Instagram.png" alt="Instagram">
      </button>

      <button class="platform-btn"
        data-ios="snssdk1128://"
        data-android="snssdk1128://"
        data-web="https://www.tiktok.com"
        data-default-img="img/png_TikTok.png"
        data-hover-img="img/png_TikTok_ovr.png">
        <img src="img/png_TikTok.png" alt="TikTok">
      </button>

    </div>

  </main>

  <script>

    // ============================================================
    // DEVICE DETECTION
    // ============================================================
    // § COMMENT: UA-based coarse device classification
    function getDevice() {
      const ua = navigator.userAgent;
      if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
      if (/Android/i.test(ua)) return "Android";
      return "Desktop";
    }

    // ============================================================
    // APP LAUNCH + FALLBACK
    // ============================================================
    // § COMMENT: Attempt deep link, fallback if no context switch
    function openApp(iosLink, androidLink, webLink) {

      const device = getDevice();

      // § COMMENT: Desktop → always web
      if (device === "Desktop") {
        window.location.href = webLink;
        return;
      }

      const appLink = device === "iOS" ? iosLink : androidLink;

      let didHide = false;

      // § COMMENT: Visibility change indicates app switch
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) didHide = true;
      });

      window.addEventListener("pagehide", () => {
        didHide = true;
      });

      // § COMMENT: Trigger deep link
      window.location.href = appLink;

      // § COMMENT: Fallback window
      setTimeout(() => {
        if (!didHide) window.location.href = webLink;
      }, 1800);
    }

    // ============================================================
    // IMAGE STATE SWAPS: HOVER / PRESS / TOUCH
    // ============================================================
    // § COMMENT: Toggle default vs hover asset
    function setButtonImage(button, hover) {
      const img = button.querySelector("img");
      img.src = hover ? button.dataset.hoverImg : button.dataset.defaultImg;
    }

    // § COMMENT: Bind UI events to buttons
    const buttons = document.querySelectorAll(".platform-btn");

    buttons.forEach(button => {

      // § COMMENT: Hover (desktop)
      button.addEventListener("mouseenter", () => setButtonImage(button, true));
      button.addEventListener("mouseleave", () => setButtonImage(button, false));

      // § COMMENT: Mouse press
      button.addEventListener("mousedown", () => setButtonImage(button, true));
      button.addEventListener("mouseup", () => setButtonImage(button, false));

      // § COMMENT: Touch interaction
      button.addEventListener("touchstart", () => setButtonImage(button, true), { passive: true });
      button.addEventListener("touchend", () => setTimeout(() => setButtonImage(button, false), 120));

      // § COMMENT: Click routing
      button.addEventListener("click", () => {
        openApp(
          button.dataset.ios,
          button.dataset.android,
          button.dataset.web
        );
      });

    });

  </script>

</body>
</html>
