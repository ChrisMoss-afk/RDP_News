<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RDP News: Platform Selection</title>

<style>

/* §§ COMMENT: Design tokens §§ */
:root {
  --bg: #0d1117;
  --text: #ffffff;
  --gap: 20px;
  --platform-size: 170px;
  --logo-size: 220px;
}

/* §§ COMMENT: Reset §§ */
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 30px;
  text-align: center;
}

/* §§ COMMENT: Layout container §§ */
.wrap {
  max-width: 900px;
  width: 100%;
}

/* §§ COMMENT: Logo §§ */
.logo {
  width: min(var(--logo-size), 45vw);
  margin-bottom: 20px;
}

/* §§ COMMENT: Heading §§ */
h1 {
  margin-bottom: 30px;
}

/* §§ COMMENT: Platform grid §§ */
.grid {
  display: flex;
  justify-content: center;
  gap: var(--gap);
  flex-wrap: wrap;
}

/* §§ COMMENT: Button shell with depth §§ */
.btn {
  width: var(--platform-size);
  height: var(--platform-size);
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 18px;
  transition:
    transform 0.18s ease,
    box-shadow 0.25s ease,
    filter 0.25s ease;
}

/* §§ COMMENT: Hover lift + glow §§ */
.btn:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 8px 28px rgba(46, 231, 16, 0.15);
}

/* §§ COMMENT: Press feedback §§ */
.btn:active {
  transform: scale(0.96);
}

/* §§ COMMENT: Image fit §§ */
.btn img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
}

/* ============================================================
   PREMIUM CTA LINK
   ============================================================ */

/* §§ COMMENT: Base CTA styling §§ */
.jump-link {
  position: relative;
  display: inline-block;
  margin-top: 36px;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.6px;
  text-decoration: none;
  color: #2ee710;
  transition:
    color 0.25s ease,
    text-shadow 0.25s ease;
}

/* §§ COMMENT: Underline system §§ */
.jump-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 100%;
  height: 2px;
  background: #A904E2;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.28s ease 0.05s;
}

/* §§ COMMENT: Hover color + glow §§ */
.jump-link:hover {
  color: #A904E2;
  text-shadow: 0 0 8px rgba(169, 4, 226, 0.5);
}

/* §§ COMMENT: Animate underline §§ */
.jump-link:hover::after {
  transform: scaleX(1);
}

/* §§ COMMENT: Responsive scaling §§ */
@media (max-width: 600px) {
  :root {
    --platform-size: 130px;
    --logo-size: 180px;
  }
}

</style>
</head>

<body>

<div class="wrap">

  <!-- §§ COMMENT: Logo anchor §§ -->
  <img src="img/RDP_News_Logo.png" class="logo">

  <h1>Select Your Preferred Platform</h1>

  <div class="grid">

    <!-- §§ COMMENT: YouTube button §§ -->
    <button class="btn"
      data-ios="youtube://"
      data-android="vnd.youtube://"
      data-web="https://www.youtube.com"
      data-default="img/png_YouTube.png"
      data-hover="img/png_YouTube_ovr.png">
      <img src="img/png_YouTube.png" alt="YouTube">
    </button>

    <!-- §§ COMMENT: Instagram button §§ -->
    <button class="btn"
      data-ios="instagram://user?username=reddeerpolytechnic"
      data-android="intent://instagram.com/_u/reddeerpolytechnic/#Intent;package=com.instagram.android;scheme=https;end"
      data-web="https://www.instagram.com/reddeerpolytechnic/"
      data-default="img/png_Instagram.png"
      data-hover="img/png_Instagram_ovr.png">
      <img src="img/png_Instagram.png" alt="Instagram">
    </button>

    <!-- §§ COMMENT: TikTok button §§ -->
    <button class="btn"
      data-ios="snssdk1128://"
      data-android="snssdk1128://"
      data-web="https://www.tiktok.com"
      data-default="img/png_TikTok.png"
      data-hover="img/png_TikTok_ovr.png">
      <img src="img/png_TikTok.png" alt="TikTok">
    </button>

  </div>

  <!-- §§ COMMENT: Secondary CTA §§ -->
  <a href="pdf/RDP_NEWS.pdf"
     target="_blank"
     rel="noopener noreferrer"
     class="jump-link">
     Informed Consent Link
  </a>

</div>

<script>

// ============================================================
// DEVICE DETECTION
// ============================================================
// §§ COMMENT: OS routing §§
function getDevice() {
  const ua = navigator.userAgent;
  if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
  if (/Android/i.test(ua)) return "Android";
  return "Desktop";
}

// ============================================================
// APP LAUNCH + FALLBACK
// ============================================================
// §§ COMMENT: Attempt deep link then fallback §§
function openApp(ios, android, web) {

  const device = getDevice();

  if (device === "Desktop") {
    window.location.href = web;
    return;
  }

  const link = device === "iOS" ? ios : android;

  let leftPage = false;

  const markLeave = () => leftPage = true;

  window.addEventListener("pagehide", markLeave, { once: true });
  window.addEventListener("blur", markLeave, { once: true });

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) leftPage = true;
  });

  // §§ COMMENT: Launch attempt §§
  window.location.href = link;

  // §§ COMMENT: Fallback window §§
  setTimeout(() => {
    if (!leftPage) window.location.href = web;
  }, 1800);
}

// ============================================================
// IMAGE STATE SWAPS
// ============================================================
// §§ COMMENT: Swap asset state §§
function swap(btn, state) {
  const img = btn.querySelector("img");
  img.src = state ? btn.dataset.hover : btn.dataset.default;
}

// §§ COMMENT: Bind UI events §§
document.querySelectorAll(".btn").forEach(btn => {

  btn.addEventListener("mouseenter", () => swap(btn, true));
  btn.addEventListener("mouseleave", () => swap(btn, false));

  btn.addEventListener("mousedown", () => swap(btn, true));
  btn.addEventListener("mouseup", () => swap(btn, false));

  btn.addEventListener("touchstart", () => swap(btn, true), { passive: true });
  btn.addEventListener("touchend", () => setTimeout(() => swap(btn, false), 100));

  btn.addEventListener("click", () => {
    openApp(
      btn.dataset.ios,
      btn.dataset.android,
      btn.dataset.web
    );
  });

});

</script>

</body>
</html>
